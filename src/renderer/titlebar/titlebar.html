<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      height:32px;background:rgba(8,8,8,0.95);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 14px;-webkit-app-region:drag;
      border-bottom:1px solid rgba(255,255,255,0.05);
      font-family:'Inter',sans-serif;user-select:none;overflow:hidden;
    }
    span{color:#555;font-size:11px;letter-spacing:0.08em;font-weight:500;}
    .btns{display:flex;gap:7px;align-items:center;-webkit-app-region:no-drag;}
    button{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;padding:0;}
    .min{background:#f59e0b;}
    .max{background:#22c55e;}
    .cls{background:#ef4444;}
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:7px;"><img src="logo.png" width="16" height="16" style="border-radius:3px;" draggable="false"/><span>PSTREAM</span></div>
  <div class="btns">
    <button class="min" onclick="window.electronAPI.minimizeWindow()"></button>
    <button class="max" onclick="window.electronAPI.maximizeWindow()"></button>
    <button class="cls" onclick="window.electronAPI.closeWindow()"></button>
  </div>
</body>
</html>
