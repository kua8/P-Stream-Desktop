<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{height:100vh;background:#0d0d0d;color:#e5e5e5;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;-webkit-app-region:drag;user-select:none;}
    .dots{position:fixed;top:10px;right:14px;display:flex;gap:7px;-webkit-app-region:no-drag;}
    .dot{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;}
    input{width:320px;background:#161616;border:1px solid #242424;border-radius:10px;padding:12px 16px;color:#e5e5e5;font-size:14px;font-family:'Inter',sans-serif;outline:none;-webkit-app-region:no-drag;}
    input:focus{border-color:#7c3aed;}
    input::placeholder{color:#3a3a3a;}
    button.go{width:320px;background:#7c3aed;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;-webkit-app-region:no-drag;transition:background 0.2s;}
    button.go:hover{background:#6d28d9;}
    button.go:active{transform:scale(0.98);}
    h1{font-size:20px;font-weight:600;color:#fff;}
    p{font-size:13px;color:#555;text-align:center;max-width:280px;line-height:1.6;}
    .hint{font-size:11px;color:#333;}
  </style>
</head>
<body>
  <div class="dots">
    <button class="dot" style="background:#f59e0b" onclick="window.electronAPI.minimizeWindow()"></button>
    <button class="dot" style="background:#ef4444" onclick="window.electronAPI.closeWindow()"></button>
  </div>
  <img src="logo.png" width="72" height="72" style="border-radius:16px;margin-bottom:4px;" draggable="false"/>
  <h1>P-Stream Desktop</h1>
  <p>Enter the URL of your P-Stream-compatible site.</p>
  <input id="u" placeholder="e.g. pstream.net" autofocus spellcheck="false" />
  <button class="go" onclick="go()">Launch →</button>
  <span class="hint">Reset: delete %APPDATA%\pstream-desktop\config.json</span>
  <script>
    document.getElementById('u').addEventListener('keydown', e => { if(e.key==='Enter') go(); });
    function go() { const v = document.getElementById('u').value.trim(); if(v) window.electronAPI.setUrl(v); }
  </script>
</body>
</html>
